<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Ticker</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="stock-ticker">
      <div class="ticker-header">
        <h2 id="name">QtechAI</h2>
        <span class="symbol-badge" id="symbol">QTA</span>
      </div>
      <div class="price-row">
        <span id="price-value">$0.00</span>
        <span id="price-icon"><img id="img" src="" /></span>
      </div>
      <hr />
      <p id="time">--:--:-- --</p>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
